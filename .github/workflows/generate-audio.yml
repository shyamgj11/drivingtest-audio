name: Generate audio

# Manually triggered. Five shards run in parallel, each generates its slice of
# the question pool, uploads .webm files as an artifact. A final job downloads
# all five, merges manifests, makes ONE atomic commit + push, then tags audio-vN.
#
# Re-running is safe: the generator is idempotent and skips already-generated
# files (by hash). To resume after a partial failure, just click "Run workflow"
# again with the same inputs.
#
# Scripts and questions JSON live under .github/scripts/ in this repo.

on:
  workflow_dispatch:
    inputs:
      voice:
        description: 'Kokoro voice (af_heart | af_bella | af_nicole | am_adam | ...)'
        required: false
        default: 'af_heart'
      tag:
        description: 'Git tag for the resulting commit (e.g. audio-v2). Leave empty to skip tagging.'
        required: false
        default: ''
      shards:
        description: 'Number of parallel shards. 5 is the sweet spot.'
        required: false
        default: '5'

permissions:
  contents: write   # the merge job needs to commit + push to main and tag

concurrency:
  group: generate-audio
  cancel-in-progress: false

env:
  KOKORO_MODEL_URL: 'https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx'
  KOKORO_VOICES_URL: 'https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin'

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 — fan out into N parallel shards.
  # Each shard runs generate_audio.py --shard k --shards N and emits an artifact.
  # ---------------------------------------------------------------------------
  generate:
    name: shard ${{ matrix.shard }}/${{ github.event.inputs.shards || 5 }}
    runs-on: ubuntu-latest
    timeout-minutes: 330   # 5h30 — well under GitHub's 6h cap
    strategy:
      fail-fast: false      # one shard failing should not cancel the others
      matrix:
        shard: [0, 1, 2, 3, 4]   # update if you change `shards` input

    steps:
      - name: Checkout audio repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -version | head -1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install kokoro-onnx==0.4.7 soundfile numpy

      - name: Cache Kokoro model files
        id: kokoro-cache
        uses: actions/cache@v4
        with:
          path: .github/.kokoro-cache
          key: kokoro-model-v1.0

      - name: Download Kokoro model (cache miss only)
        if: steps.kokoro-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .github/.kokoro-cache
          curl -sSL --retry 3 -o .github/.kokoro-cache/kokoro-v1.0.onnx "$KOKORO_MODEL_URL"
          curl -sSL --retry 3 -o .github/.kokoro-cache/voices-v1.0.bin "$KOKORO_VOICES_URL"
          ls -lh .github/.kokoro-cache

      - name: Generate shard ${{ matrix.shard }}
        run: |
          mkdir -p audio-out
          python -u .github/scripts/generate_audio.py \
            --shard ${{ matrix.shard }} \
            --shards ${{ github.event.inputs.shards || 5 }} \
            --voice "${{ github.event.inputs.voice || 'af_heart' }}" \
            --questions .github/scripts/driving_theory_questions.json \
            --output-dir audio-out

      - name: Sanity check shard output
        run: |
          n_webm=$(ls audio-out/*.webm 2>/dev/null | wc -l)
          n_manifest=$(python -c "import json; print(len(json.load(open('audio-out/manifest.json'))['files']))" 2>/dev/null || echo 0)
          echo "Shard ${{ matrix.shard }}: $n_webm webm files, $n_manifest manifest entries"
          if [ "$n_webm" -lt 1 ]; then
            echo "::error::Shard ${{ matrix.shard }} produced no audio files"
            exit 1
          fi

      - name: Upload shard artifact
        uses: actions/upload-artifact@v4
        with:
          name: audio-shard-${{ matrix.shard }}
          path: audio-out/
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Stage 2 — single merger commit. Runs only if all shards succeed.
  # Downloads every shard artifact, merges manifests, commits everything as one
  # push to main, optionally tags.
  # ---------------------------------------------------------------------------
  merge-and-publish:
    name: merge & publish
    runs-on: ubuntu-latest
    needs: generate
    timeout-minutes: 30

    steps:
      - name: Checkout audio repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: shards/
          pattern: audio-shard-*

      - name: List downloaded shards
        run: |
          echo "Shard directories:"
          ls -la shards/
          for d in shards/audio-shard-*; do
            n=$(ls "$d"/*.webm 2>/dev/null | wc -l)
            echo "  $d: $n webm files"
          done

      - name: Merge manifests
        run: |
          MANIFESTS=$(ls shards/audio-shard-*/manifest.json | xargs)
          echo "Merging: $MANIFESTS"
          python .github/scripts/merge_manifests.py \
            --inputs $MANIFESTS \
            --output manifest.json
          echo "Merged manifest entries: $(python -c 'import json; print(len(json.load(open(\"manifest.json\"))[\"files\"]))')"

      - name: Move webm files into repo root
        run: |
          for d in shards/audio-shard-*; do
            cp "$d"/*.webm . 2>/dev/null || true
          done
          rm -rf shards/
          echo "Total webm files now in repo: $(ls *.webm | wc -l)"
          du -sh .

      - name: Commit and push
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_VOICE: ${{ github.event.inputs.voice || 'af_heart' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add '*.webm' manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit — repo already up to date."
            exit 0
          fi

          DATE=$(date -u +%Y-%m-%d)
          git commit -m "audio: regenerate narration ($DATE, voice=$INPUT_VOICE)"
          git push origin HEAD:main

          if [ -n "$INPUT_TAG" ]; then
            if git rev-parse "$INPUT_TAG" >/dev/null 2>&1; then
              echo "Tag $INPUT_TAG exists — moving it to HEAD."
              git tag -f "$INPUT_TAG"
              git push --force origin "refs/tags/$INPUT_TAG"
            else
              git tag "$INPUT_TAG"
              git push origin "$INPUT_TAG"
            fi
            echo "Tagged $INPUT_TAG → jsDelivr URL: https://cdn.jsdelivr.net/gh/${{ github.repository }}@$INPUT_TAG/"
          fi

      - name: Summary
        run: |
          {
            echo "## Audio generation complete"
            echo ""
            echo "- Shards: ${{ github.event.inputs.shards || 5 }}"
            echo "- Voice: ${{ github.event.inputs.voice || 'af_heart' }}"
            echo "- Tag: ${{ github.event.inputs.tag || '(none)' }}"
            echo "- Files committed: $(ls *.webm 2>/dev/null | wc -l) webm + 1 manifest"
            echo ""
            if [ -n "${{ github.event.inputs.tag }}" ]; then
              echo "Update \`AUDIO_BASE_URL\` in app.js:30 to \`@${{ github.event.inputs.tag }}\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
